# =============================================================================
# Model release configuration
# Defines what makes a model "production-ready" and what goes into a package.
# Consumed by scripts/promote_to_registry.py and scripts/build_package.py.
# =============================================================================

models:
  page_router:
    base_model: yolo11s-cls.pt
    task: classification
    framework: ultralytics
    labels_file: configs/labels_page_cls.yaml
    train_config: configs/train_page_cls.yaml
    registry_dir: model_registry/page_router
    # Files copied from a run into model_registry/<model>/<version>/
    artifacts:
      - { src: weights/best.pt,        dst: best.pt,                 required: true  }
      - { src: weights/best.onnx,      dst: best.onnx,               required: false }
      - { src: results.csv,            dst: results.csv,             required: false }
      - { src: confusion_matrix.png,   dst: confusion_matrix.png,    required: false }
    # Files generated by promote_to_registry.py
    generated:
      - labels.txt
      - labels.yaml
      - metadata.yaml
      - model_manifest.json
      - metrics.json
      - train_config_used.yaml
      - dataset_ref.json
      - val_report.md
      - README.md
    # Whitelist of files that go into model_packages/<...>.tar.gz
    package_whitelist:
      - best.pt
      - best.onnx
      - labels.txt
      - labels.yaml
      - metadata.yaml
      - model_manifest.json
      - metrics.json
      - train_config_used.yaml
      - dataset_ref.json
      - val_report.md
      - README.md

  drawing_segmenter:
    base_model: yolo11m-seg.pt
    task: segmentation
    framework: ultralytics
    labels_file: configs/labels_drawing_seg.yaml
    train_config: configs/train_drawing_seg.yaml
    registry_dir: model_registry/drawing_segmenter
    artifacts:
      - { src: weights/best.pt,        dst: best.pt,                 required: true  }
      - { src: weights/best.onnx,      dst: best.onnx,               required: false }
      - { src: results.csv,            dst: results.csv,             required: false }
      - { src: confusion_matrix.png,   dst: confusion_matrix.png,    required: false }
      - { src: BoxPR_curve.png,        dst: BoxPR_curve.png,         required: false }
      - { src: MaskPR_curve.png,       dst: MaskPR_curve.png,        required: false }
    generated:
      - data.yaml
      - labels.txt
      - labels.yaml
      - metadata.yaml
      - model_manifest.json
      - metrics.json
      - train_config_used.yaml
      - dataset_ref.json
      - val_report.md
      - README.md
    package_whitelist:
      - best.pt
      - best.onnx
      - data.yaml
      - labels.txt
      - labels.yaml
      - metadata.yaml
      - model_manifest.json
      - metrics.json
      - train_config_used.yaml
      - dataset_ref.json
      - val_report.md
      - README.md

# Anything matching these patterns is REFUSED inside any model_packages/* archive.
package_blacklist_patterns:
  - "data/**"
  - "data/raw/**"
  - "data/scans/**"
  - "data/pages/**"
  - "data/cvat_shared/**"
  - "data/cvat_exports/**"
  - "data/datasets/**"
  - "data/tiles/**"
  - "data/splits/**"
  - "data/inventory/**"
  - "data/reports/**"
  - "runs/**"
  - "**/events.out.tfevents*"
  - "**/train_batch*.jpg"
  - "**/val_batch*.jpg"
  - "**/*.png"
  - "**/*.jpg"
  - "**/*.jpeg"
